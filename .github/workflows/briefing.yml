name: Morning Briefing

"on":
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scraper zuerst ausführen (aktuelle Daten)
        env:
          KICKTIPP_EMAIL:     ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD:  ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: python scraper.py

      - name: Morning Briefing generieren & senden
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:         ${{ secrets.GMAIL_APP_PW }}
          BRIEFING_EMPFAENGER:  ${{ secrets.BRIEFING_EMPFAENGER }}
          KICKTIPP_COMMUNITY:   ${{ secrets.KICKTIPP_COMMUNITY }}
        run: python morning_briefing.py
